global:
  scrape_interval: 10s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:3000"]
  - job_name: auth
    static_configs:
      - targets: ["auth:4001"]
  - job_name: catalog
    static_configs:
      - targets: ["catalog:4002"]
  - job_name: cart
    static_configs:
      - targets: ["cart:4003"]
  - job_name: order
    static_configs:
      - targets: ["order:4004"]
  - job_name: payment
    static_configs:
      - targets: ["payment:4005"]
  - job_name: notification
    static_configs:
      - targets: ["notification:4006"]
